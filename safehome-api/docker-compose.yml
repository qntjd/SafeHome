version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: safehome-db
    environment:
      POSTGRES_DB: safehome
      POSTGRES_USER: safehome
      POSTGRES_PASSWORD: qntjd12!@
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: safehome-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: